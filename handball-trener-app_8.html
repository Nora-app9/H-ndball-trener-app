    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #22263a;
      --accent: #e8fa5b;
      --accent2: #4ade80;
      --text: #f0f2f8;
      --text2: #8b8fa8;
      --border: rgba(255,255,255,0.08);
      --radius: 12px;
      --radius-sm: 8px;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    #root { display: flex; height: 100vh; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1rem;
      flex-shrink: 0;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 2rem; padding: 0 0.5rem;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 15px; font-weight: 600; color: var(--text); }
    .logo-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }

    .nav-section { margin-bottom: 1.5rem; }
    .nav-label {
      font-size: 10px; font-weight: 600;
      color: var(--text2); letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0 0.75rem; margin-bottom: 0.5rem;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 14px;
      color: var(--text2);
      transition: all 0.15s;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active { background: rgba(232,250,91,0.12); color: var(--accent); }
    .nav-item .icon { font-size: 16px; width: 18px; text-align: center; }

    /* Main */
    .main {
      flex: 1; overflow-y: auto;
      padding: 2rem 2.5rem;
      background: var(--bg);
    }
    .page-header {
      margin-bottom: 2rem;
    }
    .page-title { font-size: 22px; font-weight: 600; }
    .page-sub { font-size: 14px; color: var(--text2); margin-top: 4px; }

    /* Cards */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 1rem; letter-spacing: 0.04em; text-transform: uppercase; }

    /* Grid */
    .grid { display: grid; gap: 1rem; }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }

    /* Stats */
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
    }
    .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 600; }
    .stat-value.accent { color: var(--accent); }
    .stat-value.green { color: var(--accent2); }

    /* Buttons */
    .btn {
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      border: none; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #0f1117; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg3); color: var(--text); }
    .btn-danger { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 12px; }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 2px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
    }
    .badge-green { background: rgba(74,222,128,0.15); color: var(--accent2); }
    .badge-yellow { background: rgba(232,250,91,0.15); color: var(--accent); }
    .badge-red { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-blue { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .badge-gray { background: var(--bg3); color: var(--text2); }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 0.75rem 1rem; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.04); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* Avatar */
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600;
      flex-shrink: 0;
    }

    /* Input */
    input, textarea, select {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 0.6rem 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--bg2); }

    /* Form */
    .form-group { margin-bottom: 1rem; }
    .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 500; }

    /* Checkbox row */
    .check-row {
      display: flex; align-items: center; gap: 10px;
      padding: 0.6rem 0.75rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.1s;
    }
    .check-row:hover { background: var(--bg3); }
    .check-box {
      width: 20px; height: 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0;
      transition: all 0.15s;
    }
    .check-box.checked { background: var(--accent); border-color: var(--accent); color: #0f1117; }

    /* Progress bar */
    .progress { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--bg2); padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--border); width: fit-content; }
    .tab { padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text2); border: none; background: none; font-family: inherit; transition: all 0.15s; }
    .tab.active { background: var(--bg3); color: var(--text); }

    /* Message bubble */
    .msg-bubble {
      max-width: 70%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }
    .msg-bubble.sent { background: var(--accent); color: #0f1117; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-bubble.received { background: var(--bg3); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      width: 480px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-title { font-size: 16px; font-weight: 600; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text2); gap: 8px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* AI chat */
    .chat-window { display: flex; flex-direction: column; height: calc(100vh - 200px); }
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 1rem 0; }
    .chat-input-row { display: flex; gap: 8px; margin-top: 1rem; }

    .season-month { padding: 1rem; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 0.5rem; }
    .season-month:hover { border-color: rgba(232,250,91,0.3); }

    .injury-card { padding: 1rem; border: 1px solid rgba(239,68,68,0.2); border-radius: var(--radius-sm); background: rgba(239,68,68,0.05); margin-bottom: 0.75rem; }
    .mastery-card { padding: 1rem; border: 1px solid rgba(74,222,128,0.2); border-radius: var(--radius-sm); background: rgba(74,222,128,0.05); margin-bottom: 0.75rem; }

    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .logo-text, .logo-sub, .nav-label, .nav-item span { display: none; }
      .nav-item { justify-content: center; }
      .main { padding: 1rem; }
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
  </style>

function formatDate(d) { return new Date(d).toLocaleDateString('no-NO', {day:'numeric', month:'short'}); }
function getAvatar(name, color='#e8fa5b') {
  return <div className="avatar" style={{background: color+'22', border:`1px solid ${color}44`, color: color}}>{initials(name)}</div>;
}

// ---- COMPONENTS ----

function Dashboard({ players, trainings, mastery, injuries }) {
  const totalTrainings = trainings.length;
  const avgAttendance = players.length ? Math.round(players.reduce((a,p)=>a+p.attendance_rate,0)/players.length) : 0;
  const activeInjuries = injuries.filter(i=>i.status==='aktiv').length;
  const recentMastery = mastery.slice(-3).reverse();

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Oversikt 👋</div>
        <div className="page-sub">Jenter 13 — Sesong 2024/2025</div>
      </div>

      <div className="grid grid-4" style={{marginBottom:'1.5rem'}}>
        <div className="stat-card"><div className="stat-label">Spillere</div><div className="stat-value accent">{players.length}</div></div>
        <div className="stat-card"><div className="stat-label">Treningsøkter</div><div className="stat-value">{totalTrainings}</div></div>
        <div className="stat-card"><div className="stat-label">Gj.snitt oppmøte</div><div className="stat-value green">{avgAttendance}%</div></div>
        <div className="stat-card"><div className="stat-label">Aktive skader</div><div className="stat-value" style={{color:'#f87171'}}>{activeInjuries}</div></div>
      </div>

      <div className="grid grid-2">
        <div className="card">
          <div className="card-title">Siste mestring 🏆</div>
          {recentMastery.length === 0 && <p style={{color:'var(--text2)',fontSize:'13px'}}>Ingen registrert ennå</p>}
          {recentMastery.map(m => {
            const p = players.find(pl=>pl.id===m.player_id);
            return (
              <div key={m.id} style={{display:'flex',gap:'10px',marginBottom:'0.85rem',alignItems:'flex-start'}}>
                {p && getAvatar(p.name, p.avatar_color)}
                <div>
                  <div style={{fontSize:'13px',fontWeight:500}}>{p?.name} <span className="badge badge-green">{m.skill}</span></div>
                  <div style={{fontSize:'12px',color:'var(--text2)',marginTop:2}}>{m.note}</div>
                  <div style={{fontSize:'11px',color:'var(--text2)',marginTop:2}}>{formatDate(m.date)}</div>
                </div>
              </div>
            );
          })}
        </div>

        <div className="card">
          <div className="card-title">Oppmøtetoppen</div>
          {[...players].sort((a,b)=>b.attendance_rate-a.attendance_rate).slice(0,5).map(p => (
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,marginBottom:'0.75rem'}}>
              {getAvatar(p.name, p.avatar_color)}
              <div style={{flex:1}}>
                <div style={{fontSize:'13px',fontWeight:500,marginBottom:3}}>{p.name}</div>
                <div className="progress"><div className="progress-bar" style={{width:`${p.attendance_rate}%`}}></div></div>
              </div>
              <span style={{fontSize:'13px',fontWeight:600,color:'var(--accent)',minWidth:36,textAlign:'right'}}>{p.attendance_rate}%</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function Players({ players, setPlayers, mastery, injuries }) {
  const [selected, setSelected] = useState(null);
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({name:'',number:'',position:'Keeper',strengths:'',weaknesses:'',notes:''});
  const [tab, setTab] = useState('profil');

  function openNew() { setForm({name:'',number:'',position:'Keeper',strengths:'',weaknesses:'',notes:''}); setShowModal(true); setSelected(null); }
  function openEdit(p) { setForm({...p}); setSelected(p); setShowModal(true); }

  function savePlayer() {
    if (!form.name) return;
    if (selected) {
      setPlayers(ps => ps.map(p => p.id===selected.id ? {...p,...form} : p));
    } else {
      const colors = ['#e8fa5b','#4ade80','#60a5fa','#f472b6','#fb923c','#a78bfa','#34d399','#f59e0b'];
      setPlayers(ps => [...ps, {...form, id: Date.now(), attendance_rate: 0, avatar_color: colors[ps.length % colors.length]}]);
    }
    setShowModal(false);
  }

  function deletePlayer(id) { setPlayers(ps => ps.filter(p=>p.id!==id)); }

  const [detailPlayer, setDetailPlayer] = useState(null);

  if (detailPlayer) {
    const p = players.find(pl=>pl.id===detailPlayer);
    const playerMastery = mastery.filter(m=>m.player_id===detailPlayer);
    const playerInjuries = injuries.filter(i=>i.player_id===detailPlayer);
    return (
      <div>
        <div style={{display:'flex',alignItems:'center',gap:'1rem',marginBottom:'1.5rem'}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setDetailPlayer(null)}>← Tilbake</button>
          <div className="page-title">{p?.name}</div>
          <span className="badge badge-gray">{p?.position}</span>
          {p && <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(p)}>Rediger</button>}
        </div>

        <div className="tabs">
          {['profil','mestring','skader'].map(t=><button key={t} className={`tab${tab===t?' active':''}`} onClick={()=>setTab(t)}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
        </div>

        {tab==='profil' && p && (
          <div className="grid grid-2">
            <div className="card">
              <div className="card-title">Styrker</div>
              <p style={{fontSize:'14px',color:'var(--accent2)'}}>{p.strengths || 'Ikke registrert'}</p>
            </div>
            <div className="card">
              <div className="card-title">Forbedringsområder</div>
              <p style={{fontSize:'14px',color:'#fb923c'}}>{p.weaknesses || 'Ikke registrert'}</p>
            </div>
            <div className="card" style={{gridColumn:'1/-1'}}>
              <div className="card-title">Notater fra trenere</div>
              <p style={{fontSize:'14px',color:'var(--text2)'}}>{p.notes || 'Ingen notater ennå'}</p>
            </div>
          </div>
        )}

        {tab==='mestring' && (
          <div>
            {playerMastery.length === 0 && <p style={{color:'var(--text2)',fontSize:'14px'}}>Ingen mestringsregistreringer ennå.</p>}
            {playerMastery.map(m=>(
              <div key={m.id} className="mastery-card">
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span className="badge badge-green">{m.skill}</span>
                  <span style={{fontSize:'11px',color:'var(--text2)'}}>{formatDate(m.date)}</span>
                </div>
                <p style={{fontSize:'14px',marginTop:6}}>{m.note}</p>
                <p style={{fontSize:'12px',color:'var(--text2)',marginTop:4}}>{m.coach}</p>
              </div>
            ))}
          </div>
        )}

        {tab==='skader' && (
          <div>
            {playerInjuries.length === 0 && <p style={{color:'var(--text2)',fontSize:'14px'}}>Ingen skaderegistreringer.</p>}
            {playerInjuries.map(i=>(
              <div key={i.id} className="injury-card">
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                  <span style={{fontWeight:500}}>{i.type}</span>
                  <span className={`badge ${i.status==='aktiv'?'badge-red':'badge-green'}`}>{i.status}</span>
                </div>
                <p style={{fontSize:'14px',color:'var(--text2)',marginTop:4}}>{i.description}</p>
                <p style={{fontSize:'12px',color:'var(--text2)',marginTop:4}}>Forventet tilbake: {i.return_date ? formatDate(i.return_date) : '–'}</p>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <div className="page-title">Spillerprofiler</div>
          <div className="page-sub">{players.length} spillere registrert</div>
        </div>
        <button className="btn btn-primary" onClick={openNew}>+ Ny spiller</button>
      </div>

      <div className="card">
        <table>
          <thead>
            <tr>
              <th>Spiller</th>
              <th>#</th>
              <th>Posisjon</th>
              <th>Oppmøte</th>
              <th>Styrker</th>
              <th>Fokus</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {players.map(p => (
              <tr key={p.id}>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    {getAvatar(p.name, p.avatar_color)}
                    <span style={{fontWeight:500,cursor:'pointer',color:'var(--accent)'}} onClick={()=>setDetailPlayer(p.id)}>{p.name}</span>
                  </div>
                </td>
                <td style={{color:'var(--text2)'}}>{p.number}</td>
                <td><span className="badge badge-gray">{p.position}</span></td>
                <td>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div className="progress" style={{width:60}}><div className="progress-bar" style={{width:`${p.attendance_rate}%`}}></div></div>
                    <span style={{fontSize:'12px',color:'var(--text2)'}}>{p.attendance_rate}%</span>
                  </div>
                </td>
                <td style={{fontSize:'13px',color:'var(--accent2)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.strengths||'–'}</td>
                <td style={{fontSize:'13px',color:'#fb923c',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.weaknesses||'–'}</td>
                <td>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>openEdit(p)}>Rediger</button>
                    <button className="btn btn-danger btn-sm" onClick={()=>deletePlayer(p.id)}>×</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">{selected ? 'Rediger spiller' : 'Legg til spiller'}</div>
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowModal(false)}>×</button>
            </div>
            <div className="form-group"><label className="form-label">Navn</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Fullt navn" /></div>
            <div className="grid grid-2">
              <div className="form-group"><label className="form-label">Nummer</label><input value={form.number} onChange={e=>setForm({...form,number:e.target.value})} placeholder="7" /></div>
              <div className="form-group"><label className="form-label">Posisjon</label>
                <select value={form.position} onChange={e=>setForm({...form,position:e.target.value})}>
                  {POSITIONS.map(pos=><option key={pos}>{pos}</option>)}
                </select>
              </div>
            </div>
            <div className="form-group"><label className="form-label">Styrker</label><input value={form.strengths} onChange={e=>setForm({...form,strengths:e.target.value})} placeholder="f.eks. Rask, god avslutter" /></div>
            <div className="form-group"><label className="form-label">Forbedringsområder</label><input value={form.weaknesses} onChange={e=>setForm({...form,weaknesses:e.target.value})} placeholder="f.eks. Underarmskudd, forsvar" /></div>
            <div className="form-group"><label className="form-label">Notater</label><textarea rows={3} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Trenernotater..." /></div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:'0.5rem'}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Avbryt</button>
              <button className="btn btn-primary" onClick={savePlayer}>Lagre</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function Attendance({ players, trainings, setTrainings }) {
  const [showModal, setShowModal] = useState(false);
  const [form, setForm] = useState({ date: new Date().toISOString().split('T')[0], type: 'Teknisk', present: [] });

  function togglePresent(id) {
    setForm(f => ({ ...f, present: f.present.includes(id) ? f.present.filter(x=>x!==id) : [...f.present, id] }));
  }

  function saveTraining() {
    setTrainings(ts => [...ts, { ...form, id: Date.now(), absent: players.filter(p=>!form.present.includes(p.id)).map(p=>p.id) }]);
    setShowModal(false);
    setForm({ date: new Date().toISOString().split('T')[0], type: 'Teknisk', present: [] });
  }

  function markAll() { setForm(f=>({...f, present: players.map(p=>p.id)})); }

  return (
    <div>
      <div className="page-header" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div>
          <div className="page-title">Oppmøteregister</div>
          <div className="page-sub">{trainings.length} treningsøkter registrert</div>
        </div>
        <button className="btn btn-primary" onClick={()=>setShowModal(true)}>+ Registrer økt</button>
      </div>

      <div className="card">
        <table>
          <thead>
            <tr>
              <th>Dato</th>
              <th>Type</th>
              <th>Til stede</th>
              <th>Fraværende</th>
              <th>Oppmøte</th>
            </tr>
          </thead>
          <tbody>
            {[...trainings].reverse().map(t => {
              const pct = players.length ? Math.round(t.present.length/players.length*100) : 0;
              const absentPlayers = players.filter(p=>t.absent.includes(p.id));
              return (
                <tr key={t.id}>
                  <td style={{fontWeight:500}}>{formatDate(t.date)}</td>
                  <td><span className="badge badge-blue">{t.type}</span></td>
                  <td style={{color:'var(--accent2)',fontWeight:500}}>{t.present.length}</td>
                  <td>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                      {absentPlayers.map(p=><span key={p.id} className="badge badge-red" style={{fontSize:'10px'}}>{p.name.split(' ')[0]}</span>)}
                    </div>
                  </td>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div className="progress" style={{width:80}}><div className="progress-bar" style={{width:`${pct}%`,background:pct>85?'var(--accent2)':'var(--accent)'}}></div></div>
                      <span style={{fontSize:'12px',color:'var(--text2)'}}>{pct}%</span>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {showModal && (
        <div className="modal-overlay" onClick={()=>setShowModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header">
              <div className="modal-title">Registrer treningsøkt</div>
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowModal(false)}>×</button>
            </div>
            <div className="grid grid-2" style={{marginBottom:'1rem'}}>
              <div className="form-group"><label className="form-label">Dato</label><input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} /></div>
              <div className="form-group"><label className="form-label">Type</label>
                <select value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
                  {['Teknisk','Taktisk – forsvar','Taktisk – angrep','Fysisk','Kamp + gjennomgang','Keepertrening'].map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.75rem'}}>
              <label className="form-label" style={{margin:0}}>Hvem møtte opp? ({form.present.length}/{players.length})</label>
              <button className="btn btn-ghost btn-sm" onClick={markAll}>Alle til stede</button>
            </div>
            <div style={{maxHeight:240,overflowY:'auto',marginBottom:'1rem'}}>
              {players.map(p => (
                <div key={p.id} className="check-row" onClick={()=>togglePresent(p.id)}>
                  <div className={`check-box${form.present.includes(p.id)?' checked':''}`}>{form.present.includes(p.id)?'✓':''}</div>
                  {getAvatar(p.name, p.avatar_color)}
                  <span style={{fontSize:'14px'}}>{p.name}</span>
                  <span style={{fontSize:'12px',color:'var(--text2)',marginLeft:'auto'}}>#{p.number}</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost" onClick={()=>setShowModal(false)}>Avbryt</button>
              <button className="btn btn-primary" onClick={saveTraining}>Lagre økt</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

      'forflytning': ['Forflytning'],
      'plassering': ['Plassering / grunnposisjon', 'Plassering og sperre'],
    };

    const matchedNames = new Set();
    for (const [keyword, skillNames] of Object.entries(KEYWORD_MAP)) {
      if (combined.includes(keyword)) {
        skillNames.forEach(s => matchedNames.add(s));
      }

function AIChat({ players }) {
  const COACHES = [
    { id: 'kari', name: 'Trener Kari', role: 'Teknisk trener – fokus på individuelle ferdigheter', color: '#e8fa5b' },
    { id: 'ane', name: 'Trener Ane', role: 'Taktisk trener – forsvar og lagtaktikk', color: '#4ade80' },
    { id: 'per', name: 'Trener Per', role: 'Fysisk trener – kondisjon og styrke', color: '#60a5fa' },
  ];

  const [selectedCoach, setSelectedCoach] = useState(COACHES[0]);
  const [messages, setMessages] = useState([
    { role: 'assistant', text: `Hei! Jeg er ${COACHES[0].name}. ${COACHES[0].role}. Hva lurer du på?` }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({behavior:'smooth'}); }, [messages]);

  async function sendMessage() {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput('');
    setMessages(ms => [...ms, { role:'user', text: userMsg }]);
    setLoading(true);

    try {
      const systemPrompt = `Du er ${selectedCoach.name}, en håndballtrener for et jenter 13-lag. ${selectedCoach.role}. 
      Svar på norsk, vær engasjerende, konkret og støttende. Gi praktiske råd tilpasset 13-åringer.
      Spillere på laget: ${players.map(p=>p.name+' ('+p.position+')').join(', ')}.`;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompt,
          messages: [
            ...messages.filter(m=>m.role!=='assistant'||messages.indexOf(m)>0).map(m=>({ role: m.role==='user'?'user':'assistant', content: m.text })),
            { role: 'user', content: userMsg }
          ]
        })
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || 'Beklager, noe gikk galt.';
      setMessages(ms => [...ms, { role:'assistant', text: reply }]);
    } catch(e) {
      setMessages(ms => [...ms, { role:'assistant', text: 'Klarte ikke koble til AI. Sjekk internettforbindelsen.' }]);
    }
    setLoading(false);
  }

  function switchCoach(coach) {
    setSelectedCoach(coach);
    setMessages([{ role:'assistant', text: `Hei! Jeg er ${coach.name}. ${coach.role}. Hva lurer du på?` }]);
  }

  return (
    <div>
      <div className="page-header">
        <div className="page-title">AI-chat med trenere</div>
        <div className="page-sub">Still spørsmål til trener-AI</div>
      </div>

      <div style={{display:'flex',gap:'0.75rem',marginBottom:'1.25rem'}}>
        {COACHES.map(c => (
          <button key={c.id} onClick={()=>switchCoach(c)} style={{
            padding:'0.6rem 1rem',borderRadius:'var(--radius-sm)',cursor:'pointer',
            background: selectedCoach.id===c.id ? c.color+'22' : 'var(--bg2)',
            border: `1px solid ${selectedCoach.id===c.id ? c.color+'66' : 'var(--border)'}`,
            color: selectedCoach.id===c.id ? c.color : 'var(--text2)',
            fontFamily:'DM Sans,sans-serif', fontSize:'13px', fontWeight:500,
            transition:'all 0.15s'
          }}>
            {c.name}
          </button>
        ))}
      </div>

      <div className="card" style={{padding:'1rem'}}>
        <div className="chat-window">
          <div className="chat-messages">
            {messages.map((m,i) => (
              <div key={i} style={{display:'flex', flexDirection:'column', alignItems: m.role==='user'?'flex-end':'flex-start'}}>
                {m.role==='assistant' && <div style={{fontSize:'11px',color:'var(--text2)',marginBottom:4,paddingLeft:4}}>{selectedCoach.name}</div>}
                <div className={`msg-bubble ${m.role==='user'?'sent':'received'}`}>{m.text}</div>
              </div>
            ))}
            {loading && (
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-start'}}>
                <div className="msg-bubble received" style={{color:'var(--text2)'}}>Skriver...</div>
              </div>
            )}
            <div ref={endRef}></div>
          </div>
          <div className="chat-input-row">
            <input
              value={input}
              onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}}
              placeholder={`Spør ${selectedCoach.name}...`}
            />
            <button className="btn btn-primary" onClick={sendMessage} disabled={loading}>Send</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function useSupabaseData() {
  const [players, setPlayersState] = React.useState(MOCK_PLAYERS);
  const [trainings, setTrainingsState] = React.useState(MOCK_TRAININGS);
  const [mastery, setMasteryState] = React.useState(MOCK_MASTERY);
  const [injuries, setInjuriesState] = React.useState(MOCK_INJURIES);
  const [messages, setMessagesState] = React.useState([
    { id:1, from:'Trener Kari', to:'all', text:'Husk ekstra treningsøkt fredag kl 17:00 på Gimle. Ta med vannflaske og innesko!', date:'2025-01-14', read: true },
    { id:2, from:'Trener Ane', to:1, text:'Emma – kjempebra jobb på treningen i dag! Underarmskuddet ditt har utviklet seg veldig!', date:'2025-01-13', read: false },
  ]);
  const [dbReady, setDbReady] = React.useState(false);
  const [dbError, setDbError] = React.useState(null);

  React.useEffect(() => {
    async function load() {
      if (!supabase) return;
      try {
        const [p, t, m, i, msg] = await Promise.all([
          supabase.from('players').select('*').order('name'),
          supabase.from('trainings').select('*').order('date', {ascending:false}),
          supabase.from('mastery').select('*').order('date', {ascending:false}),
          supabase.from('injuries').select('*').order('date', {ascending:false}),
          supabase.from('messages').select('*').order('date', {ascending:false}),
        ]);
        if (p.error) throw p.error;
        if (p.data && p.data.length > 0) setPlayersState(p.data);
        if (t.data && t.data.length > 0) setTrainingsState(t.data);
        if (m.data && m.data.length > 0) setMasteryState(m.data);
        if (i.data && i.data.length > 0) setInjuriesState(i.data);
        if (msg.data && msg.data.length > 0) setMessagesState(msg.data);
        setDbReady(true);
      } catch(e) {
        setDbError('Bruker demo-data. Kjør SQL-oppsettet i Supabase for å aktivere lagring.');
      }
    }
    load();
  }, []);

  async function setPlayers(updater) {
    const next = typeof updater === 'function' ? updater(players) : updater;
    setPlayersState(next);
    if (!dbReady) return;
    const added = next.filter(n => !players.find(p=>p.id===n.id));
    const updated = next.filter(n => players.find(p=>p.id===n.id && JSON.stringify(p)!==JSON.stringify(n)));
    const removed = players.filter(p => !next.find(n=>n.id===p.id));
    for (const p of added) { const {id,...rest}=p; await supabase.from('players').insert(rest); }
    for (const p of updated) { const {id,...rest}=p; await supabase.from('players').update(rest).eq('id',id); }
    for (const p of removed) { await supabase.from('players').delete().eq('id',p.id); }
  }

  async function setTrainings(updater) {
    const next = typeof updater === 'function' ? updater(trainings) : updater;
    setTrainingsState(next);
    if (!dbReady) return;
    const added = next.filter(n => !trainings.find(t=>t.id===n.id));
    for (const t of added) { const {id,...rest}=t; await supabase.from('trainings').insert(rest); }
  }

  async function setMastery(updater) {
    const next = typeof updater === 'function' ? updater(mastery) : updater;
    setMasteryState(next);
    if (!dbReady) return;
    const added = next.filter(n => !mastery.find(m=>m.id===n.id));
    for (const m of added) { const {id,...rest}=m; await supabase.from('mastery').insert(rest); }
  }

  async function setInjuries(updater) {
    const next = typeof updater === 'function' ? updater(injuries) : updater;
    setInjuriesState(next);
    if (!dbReady) return;
    const added = next.filter(n => !injuries.find(i=>i.id===n.id));
    const updated = next.filter(n => injuries.find(i=>i.id===n.id && JSON.stringify(i)!==JSON.stringify(n)));
    for (const i of added) { const {id,...rest}=i; await supabase.from('injuries').insert(rest); }
    for (const i of updated) { const {id,...rest}=i; await supabase.from('injuries').update(rest).eq('id',id); }
  }

  async function setMessages(updater) {
    const next = typeof updater === 'function' ? updater(messages) : updater;
    setMessagesState(next);
    if (!dbReady) return;
    const added = next.filter(n => !messages.find(m=>m.id===n.id));
    for (const m of added) { const {id,...rest}=m; await supabase.from('messages').insert(rest); }
  }

  return { players, setPlayers, trainings, setTrainings, mastery, setMastery, injuries, setInjuries, messages, setMessages, dbReady, dbError };
}

function PhysicalTraining() {
  const [section, setSection] = useState('styrke');
  const [expanded, setExpanded] = useState(null);
  const [filterCat, setFilterCat] = useState('Alle');

  const categories = ['Alle', ...Object.keys(CATEGORY_COLORS)];
  const filtered = filterCat === 'Alle' ? STRENGTH_EXERCISES : STRENGTH_EXERCISES.filter(e => e.category === filterCat);

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Fysisk trening 💪</div>
        <div className="page-sub">Øvelsesbiblitek – kroppsvektøvelser for håndballspillere</div>
      </div>

      <div className="tabs" style={{marginBottom:'1rem'}}>
        <button className={`tab${section==='styrke'?' active':''}`} onClick={()=>setSection('styrke')}>Styrke</button>
        <button className={`tab${section==='kondisjon'?' active':''}`} onClick={()=>setSection('kondisjon')}>Kondisjon</button>
        <button className={`tab${section==='spenst'?' active':''}`} onClick={()=>setSection('spenst')}>Spenst</button>
      </div>

      {section==='styrke' && (
        <div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:'1.25rem'}}>
            {categories.map(c => (
              <button key={c} onClick={()=>{setFilterCat(c);setExpanded(null);}} style={{
                padding:'4px 10px',borderRadius:20,fontSize:'11px',fontWeight:500,cursor:'pointer',
                border:`1px solid ${filterCat===c?(CATEGORY_COLORS[c]||'var(--accent)'):'var(--border)'}`,
                background: filterCat===c?(CATEGORY_COLORS[c]||'var(--accent)')+'22':'transparent',
                color: filterCat===c?(CATEGORY_COLORS[c]||'var(--accent)'):'var(--text2)',
                fontFamily:'inherit'
              }}>{c}</button>
            ))}
          </div>

          <div style={{fontSize:'13px',color:'var(--text2)',marginBottom:'1rem'}}>{filtered.length} øvelser</div>

          {filtered.map((ex) => (
            <div key={ex.id} style={{border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',marginBottom:'0.6rem',overflow:'hidden'}}>
              <div
                onClick={()=>setExpanded(expanded===ex.id?null:ex.id)}
                style={{padding:'0.85rem 1rem',cursor:'pointer',display:'flex',alignItems:'center',gap:12,background:expanded===ex.id?'var(--bg3)':'var(--bg2)',transition:'background 0.15s'}}
              >
                <span style={{width:28,height:28,borderRadius:6,background:(CATEGORY_COLORS[ex.category]||'#888')+'22',color:(CATEGORY_COLORS[ex.category]||'#888'),fontSize:'11px',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{ex.id}</span>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500,fontSize:'14px'}}>{ex.name}</div>
                  <div style={{fontSize:'11px',color:'var(--text2)',marginTop:1}}>{ex.category} · {ex.reps}</div>
                </div>
                <div style={{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'flex-end',maxWidth:200}}>
                  {ex.muscles.slice(0,2).map((m,i)=><span key={i} className="badge badge-gray" style={{fontSize:'10px'}}>{m.split(' ')[0]}</span>)}
                </div>
                <span style={{color:'var(--text2)',fontSize:'18px',transform:expanded===ex.id?'rotate(90deg)':'none',transition:'transform 0.2s',marginLeft:4}}>›</span>
              </div>

              {expanded===ex.id && (
                <div style={{background:'var(--bg)',borderTop:'1px solid var(--border)',padding:'1.25rem'}}>
                  <div className="grid grid-2" style={{gap:'1.25rem'}}>
                    <div>
                      <div style={{marginBottom:'1rem',background:'var(--bg2)',borderRadius:'var(--radius-sm)',padding:'0.75rem',display:'flex',justifyContent:'center'}}
                        dangerouslySetInnerHTML={{__html: ex.svg}}
                      />
                      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                        {ex.muscles.map((m,i)=><span key={i} className="badge" style={{fontSize:'10px',background:(CATEGORY_COLORS[ex.category]||'#888')+'18',color:(CATEGORY_COLORS[ex.category]||'#888')}}>{m}</span>)}
                      </div>
                    </div>
                    <div>
                      <div style={{marginBottom:'0.85rem'}}>
                        <div style={{fontSize:'11px',color:'var(--text2)',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:4}}>Utførelse</div>
                        <p style={{fontSize:'13px',lineHeight:1.7,color:'var(--text)'}}>{ex.how}</p>
                      </div>
                      <div style={{marginBottom:'0.85rem'}}>
                        <div style={{fontSize:'11px',color:'var(--text2)',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',marginBottom:4}}>Sets / reps</div>
                        <span className="badge badge-yellow" style={{fontSize:'12px'}}>{ex.reps}</span>
                      </div>
                      <div style={{marginBottom:'0.85rem',padding:'0.75rem',background:'rgba(74,222,128,0.06)',borderRadius:'var(--radius-sm)',border:'1px solid rgba(74,222,128,0.15)'}}>
                        <div style={{fontSize:'11px',color:'var(--accent2)',fontWeight:600,marginBottom:4}}>🤾 Håndball-relevans</div>
                        <p style={{fontSize:'12px',lineHeight:1.6,color:'var(--text2)'}}>{ex.handball}</p>
                      </div>
                      <div style={{padding:'0.75rem',background:'rgba(248,113,113,0.06)',borderRadius:'var(--radius-sm)',border:'1px solid rgba(248,113,113,0.15)'}}>
                        <div style={{fontSize:'11px',color:'#f87171',fontWeight:600,marginBottom:4}}>🛡️ Skadeforebygging</div>
                        <p style={{fontSize:'12px',lineHeight:1.6,color:'var(--text2)'}}>{ex.injury}</p>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {section==='kondisjon' && (
        <div style={{padding:'2rem',textAlign:'center',color:'var(--text2)'}}>
          <div style={{fontSize:'32px',marginBottom:'0.75rem'}}>🏃‍♀️</div>
          <p style={{fontSize:'14px'}}>Kondisjonsdelen kommer snart!</p>
        </div>
      )}
      {section==='spenst' && (
        <div style={{padding:'2rem',textAlign:'center',color:'var(--text2)'}}>
          <div style={{fontSize:'32px',marginBottom:'0.75rem'}}>⬆️</div>
          <p style={{fontSize:'14px'}}>Spenst og plyometri kommer snart!</p>
        </div>
      )}
    </div>
  );
}

  const SQL = `-- Kjør dette i Supabase SQL Editor
-- supabase.com → ditt prosjekt → SQL Editor → New query → Run

create table if not exists players (
  id bigint generated always as identity primary key,

  number text,
  position text,
  strengths text,
  weaknesses text,
  notes text,
  attendance_rate int default 0,
  avatar_color text default '#e8fa5b'
);

create table if not exists trainings (
  id bigint generated always as identity primary key,
  date date not null,
  type text,
  present int[] default '{}',
  absent int[] default '{}'
);

create table if not exists mastery (
  id bigint generated always as identity primary key,
  player_id int not null,
  date date not null,
  skill text,
  note text,
  coach text
);

create table if not exists injuries (
  id bigint generated always as identity primary key,
  player_id int not null,
  date date not null,
  type text,
  status text default 'aktiv',
  desc text,
  return_date date
);

create table if not exists messages (
  id bigint generated always as identity primary key,
  "from" text,
  "to" text,
  text text,
  date date not null,
  read boolean default false
);

alter table players enable row level security;
alter table trainings enable row level security;
alter table mastery enable row level security;
alter table injuries enable row level security;
alter table messages enable row level security;

create policy "allow all" on players for all using (true) with check (true);
create policy "allow all" on trainings for all using (true) with check (true);
create policy "allow all" on mastery for all using (true) with check (true);
